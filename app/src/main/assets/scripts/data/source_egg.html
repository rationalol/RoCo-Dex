function initShinyBar(){
  const btn=document.getElementById('shinyBtn');
  const cnt=allSpirits.filter(s=>s.sh===1).length;
  btn.innerHTML=`✨ 异色传递计算器 <span class="count">${cnt}</span>`;
  btn.addEventListener('click',()=>{
    shinyOnly=!shinyOnly;
    btn.classList.toggle('active',shinyOnly);
    filterAndRender();
  });
}

function buildFilterBar(){
  const bar=document.getElementById('filterBar');
  const gc={}; allGroups.forEach(g=>{gc[g]=0;}); allSpirits.forEach(s=>{s.eg.forEach(g=>{gc[g]=(gc[g]||0)+1;});});
  const sorted=allGroups.filter(g=>g!=='无法孵蛋').sort((a,b)=>(gc[b]||0)-(gc[a]||0));
  if(allGroups.includes('无法孵蛋'))sorted.push('无法孵蛋');
  sorted.forEach(g=>{const btn=document.createElement('button');btn.className='filter-btn';btn.dataset.group=g;btn.innerHTML=`${EGG_ICONS[g]||'🥚'} ${g} <span class="count">${gc[g]||0}</span>`;bar.appendChild(btn);});
  bar.addEventListener('click',e=>{const btn=e.target.closest('.filter-btn');if(!btn)return;if(btn.classList.contains('active')){btn.classList.remove('active');currentGroup='';}else{bar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentGroup=btn.dataset.group;}updateEggGroupInfo();filterAndRender();});
}

function updateEggGroupInfo(){
  const info=document.getElementById('eggGroupInfo'),title=document.getElementById('eggGroupTitle'),desc=document.getElementById('eggGroupDesc');
  if(currentGroup){info.querySelector('.egg-icon').textContent=EGG_ICONS[currentGroup]||'🥚';title.textContent=currentGroup;desc.textContent=EGG_DESC[currentGroup]||'';info.classList.add('visible');}else{info.classList.remove('visible');}
}

function filterAndRender(){
  const search=document.getElementById('searchInput').value.trim().toLowerCase();
  let list=allSpirits;
  if(currentGroup)list=list.filter(s=>s.eg.includes(currentGroup));
  if(shinyOnly)list=list.filter(s=>s.sh===1);
  if(search)list=list.filter(s=>s.nm.toLowerCase().includes(search)||s.fn.toLowerCase().includes(search)||s.n.toLowerCase().includes(search));
  renderGrid(list);
}

function renderGrid(spirits){
  const grid=document.getElementById('spiritGrid');
  document.getElementById('statsInfo').textContent=`共 ${spirits.length} 只精灵`;
  if(!spirits.length){grid.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>没有找到匹配的精灵</div>';return;}
  grid.innerHTML=spirits.map(s=>{
    let eb=elemDot(s.e,22); if(s.e2)eb+=elemDot(s.e2,22);
    const et=s.eg.map(g=>`<span class="egg-tag${g==='无法孵蛋'?' no-egg':''}">${EGG_ICONS[g]||'🥚'} ${g}</span>`).join('');
    const canTransfer=s.sh===1&&!s.eg.every(g=>g==='无法孵蛋');
    const clickable=canTransfer;
    return `<div class="spirit-card${clickable?' clickable':''}" ${clickable?`onclick="openTransfer('${s.nm}')"`:''}><div class="number">${s.n}</div><div class="img-wrap"><img src="${s.img}" alt="${s.fn}" loading="lazy" onerror="this.style.opacity=0.3"></div><div class="elem-badge">${eb}</div><div class="name">${s.fn}</div><div class="egg-tags">${et}</div></div>`;
  }).join('');
}

// ====== 异色传递浮层 ======
function openTransfer(name){
  const modal=document.getElementById('transferModal');
  modal.classList.add('active');
  document.body.style.overflow='hidden';
  document.getElementById('tmHeader').innerHTML='<div style="color:#fff;padding:20px">加载中...</div>';
  document.getElementById('tmBody').innerHTML='';

  if(!transferCache[name]){
    transferCache[name]=_buildTransferResult(name);
  }
  const data=transferCache[name];
  const defaultGender = data.start.gender==='female' ? 'female' : 'male';
  renderTransferModal(data, defaultGender);
}

function shinyImg(img){ return (img && img !== 'undefined') ? img.replace('.png','_shiny.png') : ''; }
function safeImg(img){ return (img && img !== 'undefined') ? img : ''; }

function renderTransferModal(data, gender){
  const c=data.clicked, s=data.start, spirits=data.spirits||{};
  const gTags=(c.eg||[]).map(g=>`<span class="tag">${EGG_ICONS[g]||''} ${g}</span>`).join('');
  const isFemaleOnly = s.gender==='female';
  const genderLabel = isFemaleOnly ? '<span class="tag">♀ 纯母</span>' : '<span class="tag">♂♀</span>';
  const cShiny = shinyImg(c.img, c.nm);

  document.getElementById('tmHeader').innerHTML=`
    <img src="${cShiny||safeImg(c.img)}" onerror="this.src='${safeImg(c.img)}';this.onerror=null">
    <div class="info"><div class="num">${c.n||''}</div><div class="name">${c.nm}</div><div class="tags">${gTags}${genderLabel}</div></div>
    <button class="close-btn" onclick="closeTransfer()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>`;

  let html='';
  html+=`<div class="gender-select">
    <button class="gender-btn${gender==='male'&&!isFemaleOnly?' active':''}" ${isFemaleOnly?'disabled style="opacity:0.35;cursor:not-allowed"':'onclick="switchGender(\''+c.nm+'\',\'male\')"'}>♂ 公</button>
    <button class="gender-btn${gender==='female'||isFemaleOnly?' active':''}" onclick="switchGender('${c.nm}','female')">♀ 母</button>
  </div>`;

  // 选母时，加第0步（用最终形态数据）
  if(gender==='female'||isFemaleOnly){
    const sShiny = shinyImg(s.img, s.nm);
    const maleNode = isFemaleOnly
      ? `<div class="path-node"><img src="a/m/问号.png" onerror="this.style.opacity=0.3"><div class="p-name">♂ 任意同蛋组精灵</div></div>`
      : `<div class="path-node"><img src="${safeImg(s.img)}" onerror="this.style.opacity=0.3"><div class="p-name">♂ ${s.nm}</div></div>`;
    const resultGender = isFemaleOnly ? '♀' : '♂';
    html+=`<div class="section-card"><div class="section-title">第 0 步 <span class="badge">准备</span></div>
      <div class="path-row" style="justify-content:center;padding:2vw 0;">
        <div class="path-node"><img src="${sShiny||safeImg(s.img)}" onerror="this.src='${safeImg(s.img)}';this.onerror=null"><div class="p-name">♀ 异色${s.nm}</div></div>
        <div class="path-arrow"><div class="a-via">同蛋组</div><div class="a-icon">+</div></div>
        ${maleNode}
        <div class="path-arrow"><div class="a-via">孵蛋</div><div class="a-icon">➜</div></div>
        <div class="path-node"><img src="${sShiny||safeImg(s.img)}" onerror="this.src='${safeImg(s.img)}';this.onerror=null"><div class="p-name">${resultGender} 异色${s.nm}</div></div>
      </div>
    </div>`;
  }

  const reachable=data.reachable||[], unreachable=data.unreachable||[];

  const bySteps={};
  reachable.forEach(r=>{if(!bySteps[r.steps])bySteps[r.steps]=[];bySteps[r.steps].push(r);});

  for(const steps of Object.keys(bySteps).sort((a,b)=>a-b)){
    const items=bySteps[steps];
    html+=`<div class="section-card"><div class="section-title">可传递 <span class="badge">${steps}步 · ${items.length}只</span></div><div class="target-list">`;
    items.forEach((r,idx)=>{
      const t=r.target;
      const groups=(t.eg||[]).map(g=>`${EGG_ICONS[g]||''} ${g}`).join(' ');
      const pathId=`path_${steps}_${idx}`;
      html+=`<div><div class="target-item" onclick="togglePath('${pathId}')">
        <img src="${shinyImg(t.img)||safeImg(t.img)}" onerror="this.src='${safeImg(t.img)}';this.onerror=null">
        <div class="t-info"><div class="t-name">${t.nm}</div><div class="t-groups">${groups}</div></div>
        <div class="t-steps">${steps}步 ›</div>
      </div>
      <div class="path-detail" id="${pathId}" style="display:none"><div class="path-row">`;
      const startInfo=spirits[r.path[0].from]||{nm:r.path[0].from,img:''};
      html+=`<div class="path-node"><img src="${shinyImg(startInfo.img)||safeImg(startInfo.img)}" onerror="this.src='${safeImg(startInfo.img)}';this.onerror=null"><div class="p-name">${startInfo.nm}</div></div>`;
      r.path.forEach(step=>{
        const toInfo=spirits[step.to]||{nm:step.to,img:''};
        html+=`<div class="path-arrow"><div class="a-via">${step.via}</div><div class="a-icon">➜</div></div><div class="path-node"><img src="${shinyImg(toInfo.img)||safeImg(toInfo.img)}" onerror="this.src='${safeImg(toInfo.img)}';this.onerror=null"><div class="p-name">${toInfo.nm}</div></div>`;
      });
      html+=`</div></div></div>`;
    });
    html+=`</div></div>`;
  }

  if(unreachable.length){
    html+=`<div class="section-card" style="background:#FFF8F0;border:1px dashed #E0D0C0;"><div class="section-title" style="border-left-color:var(--accent-red);">❌ 无法传递 <span class="badge" style="background:var(--accent-red);">${unreachable.length}只</span></div><div class="target-list">`;
    unreachable.forEach(u=>{
      const groups=(u.eg||[]).map(g=>`${EGG_ICONS[g]||''} ${g}`).join(' ');
      html+=`<div class="target-item disabled"><img src="${shinyImg(u.img)||safeImg(u.img)}" onerror="this.src='${safeImg(u.img)}';this.onerror=null"><div class="t-info"><div class="t-name">${u.nm}</div><div class="t-groups">${groups}</div></div></div>`;
    });
    html+=`</div></div>`;
  }

  document.getElementById('tmBody').innerHTML=html;
}

function switchGender(name, gender){
  renderTransferModal(transferCache[name], gender);
}

function togglePath(id){
  const el=document.getElementById(id);
  el.style.display=el.style.display==='none'?'block':'none';
}

function closeTransfer(){
  document.getElementById('transferModal').classList.remove('active');
  document.body.style.overflow='';
}

document.getElementById('transferModal').addEventListener('click',e=>{if(e.target===document.getElementById('transferModal'))closeTransfer();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTransfer();});

document.getElementById('searchInput').addEventListener('input',()=>{clearTimeout(searchTimer);searchTimer=setTimeout(filterAndRender,200);});

(function(){const bar=document.getElementById('filterBar');let d=false,sx,sl;bar.addEventListener('mousedown',e=>{d=true;bar.style.cursor='grabbing';sx=e.pageX-bar.offsetLeft;sl=bar.scrollLeft;});bar.addEventListener('mouseleave',()=>{d=false;bar.style.cursor='grab';});bar.addEventListener('mouseup',()=>{d=false;bar.style.cursor='grab';});bar.addEventListener('mousemove',e=>{if(!d)return;e.preventDefault();bar.scrollLeft=sl-(e.pageX-bar.offsetLeft-sx);});bar.style.cursor='grab';})();

init();
</script>
</body>
</html>
